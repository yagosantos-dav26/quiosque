<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiosque</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .mensagem-status { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 0.95rem; font-weight: bold; display: none; text-align: center; }
        .status-sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo do Quiosque" class="logo">
        <nav>
            <a href="quiosque.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="contato.html">Contato</a>
            <a href="pedidos.html">Pedidos</a>
            <a href="login.html" class="active">Login</a>
        </nav>
    </header>

    <main>
        <section class="pedidos-container">
            <div class="pedido-card login-box">
                <h2>Acesse sua Conta</h2>
                <p>Faça login para acessar a área de pedidos.</p>
                <form class="form-quiosque">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn-enviar">Entrar</button>
                </form>
                
                <div id="status-login" class="mensagem-status"></div>
                
                <div class="form-footer">
                    <p><a href="esqueci-senha.html">Esqueci minha senha</a></p>
                    <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nosso Quiosque. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://bdlqpzfzoczouohquwpt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbHFwemZ6b2N6b3VvaHF1d3B0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDMzNTMsImV4cCI6MjA5MjAxOTM1M30.SYXW90OgDkLQGWI5FEe1GuZlpI4VDy14z6qPO_rl4Q8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const formLogin = document.querySelector('.form-quiosque');
        const statusLogin = document.getElementById('status-login');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusLogin.style.display = "none";

            const emailDigitado = document.getElementById('email').value;
            const senhaDigitada = document.getElementById('senha').value;

            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                email: emailDigitado,
                password: senhaDigitada,
            });

            if (authError) {
                statusLogin.innerText = "Erro ao entrar: " + authError.message;
                statusLogin.className = "mensagem-status status-erro";
                statusLogin.style.display = "block";
                return;
            }

            await supabaseClient.from('historico_pedidos').insert([
                { cliente_email: emailDigitado, tipo_acao: 'Login Efetuado', detalhes: 'Logou no sistema.' }
            ]);

            statusLogin.innerText = "Login realizado! Redirecionando...";
            statusLogin.className = "mensagem-status status-sucesso";
            statusLogin.style.display = "block";

            setTimeout(() => { window.location.href = "pedidos.html"; }, 1500);
        });
    </script>
</body>
</html>
