<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Quiosque</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .mensagem-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        .status-sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <header>
        <img src="logo.png" alt="Logo do Quiosque" class="logo">
        <nav>
            <a href="quiosque.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="contato.html">Contato</a>
            <a href="pedidos.html">Pedidos</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <section class="pedidos-container">
            <div class="pedido-card">
                <h2>Crie sua Conta</h2>
                <p>Cadastre-se para fazer pedidos e ganhar descontos.</p>
                <form id="form-cadastro" class="form-quiosque">
                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="senha">Crie uma Senha</label>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <button type="submit" class="btn-enviar">Cadastrar</button>
                </form>

                <div id="status-cadastro" class="mensagem-status"></div>

                <div class="form-footer">
                    <p>Já tem conta? <a href="login.html">Faça Login</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nosso Quiosque. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://bdlqpzfzoczouohquwpt.supabase.co";
        // CHAVE COMPLETA RESTAURADA:
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbHFwemZ6b2N6b3VvaHF1d3B0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDMzNTMsImV4cCI6MjA5MjAxOTM1M30.SYXW90OgDkLQGWI5FEe1GuZlpI4VDy14z6qPO_rl4Q8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const formCadastro = document.getElementById('form-cadastro');
        const statusCadastro = document.getElementById('status-cadastro');

        formCadastro.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusCadastro.style.display = "none";

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const cpf = document.getElementById('cpf').value;
            const senha = document.getElementById('senha').value;

            try {
                // PASSO 1: Cria o usuário na Autenticação nativa
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: senha,
                });

                if (authError) {
                    statusCadastro.innerText = "Erro ao cadastrar: " + authError.message;
                    statusCadastro.className = "mensagem-status status-erro";
                    statusCadastro.style.display = "block";
                    return;
                }

                const userId = authData.user?.id;

                // PASSO 2: Inclui as colunas novas de telefone e cpf no banco
                if (userId) {
                    const { error: insertError } = await supabaseClient.from('perfis_clientes').insert([
                        {
                            nome_completo: nome,
                            email: email,
                            telefone: telefone,
                            cpf: cpf
                        }
                    ]);

                    if (insertError) {
                        console.error("Erro ao salvar dados extras:", insertError.message);
                    }
                }
                statusCadastro.innerText = "Cadastro realizado com sucesso! Redirecionando...";
                statusCadastro.className = "mensagem-status status-sucesso";
                statusCadastro.style.display = "block";
                formCadastro.reset();

                setTimeout(() => { window.location.href = "login.html"; }, 2000);

            } catch (err) {
                statusCadastro.innerText = "Erro inesperado ao processar o cadastro.";
                statusCadastro.className = "mensagem-status status-erro";
                statusCadastro.style.display = "block";
            }
        });
    </script>
</body>

</html>
